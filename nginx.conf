# Бекенд Reflex (контейнер backend из docker-compose, чистый Python на :8000).
upstream reflex_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Разрешаем крупные загрузки (файлы абитуриентов и т.п.)
    client_max_body_size 50M;

    # Событийный канал Reflex (socket.io): вебсокет + long-polling.
    location /_event {
        proxy_pass http://reflex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Долгоживущие соединения вебсокета не должны рваться по таймауту.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Загрузка/выдача файлов через бекенд Reflex.
    location /_upload {
        proxy_pass http://reflex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health-check бекенда.
    location /ping {
        proxy_pass http://reflex_backend;
    }

    # Статический фронт (SPA). Reflex в проде раздаёт через `sirv --single 404.html`,
    # поэтому для несуществующих путей (в т.ч. динамических маршрутов вроде
    # /contingent/entrants/edit/5) отдаём именно 404.html — это SPA-оболочка,
    # которая дальше роутит на клиенте.
    location / {
        try_files $uri $uri/ /404.html;
    }
}
